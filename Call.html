<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Language" content="id">
  <meta name="google" content="notranslate">

<title>..</title>

<!-- ICON CDN -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
}

body{
    width:100%;
    min-height:100vh;
    overflow:hidden;
    background:black;
    font-size:16px;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:url("https://i.ibb.co.com/tPqbLqBP/ssstik-io-1780895355426.webp")
    center/cover no-repeat;

    filter:blur(28px) brightness(0.25);
    transform:scale(1.2);
}

/* MAIN */
.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* TOP */
.top{
    margin-top:70px;
    text-align:center;
}

.name{
    color:white;
    font-size:20px;
    font-weight:50;
}

.time{
    margin-top:8px;
    color:#909090;
    font-size:15px;
}

/* PROFILE */
.profile{
    margin-top:100px;

    width:150px;
    height:150px;

    border-radius:50%;
    overflow:hidden;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BOTTOM PANEL */
.bottom-panel{
    position:absolute;
    margin-top:650px;

    width:90%;
    height:80px;

    border-radius:18px;

    background:#222;

    backdrop-filter:blur(18px);

    display:flex;
    align-items:center;
    justify-content:space-evenly;
}

/* BUTTON */
.btn{
    width:45px;
    height:45px;

    border:none;
    border-radius:50%;

    background:#2d2d31;

    color:white;
    font-size:13px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.15s;
}

.btn.active{
    background:white !important;
    color:black !important;
}

.end{
    background:#ff0048;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.55);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:99;
}

.popup-box{
    width:80%;

    background:white;

    border-radius:16px;

    padding:24px;

    text-align:center;
}

.popup-box h2{
    margin-bottom:12px;
    font-size:22px;
}

.popup-box p{
    color:#555;
    margin-bottom:20px;
    font-size:15px;
}

.close-btn{
    width:100%;
    height:48px;

    border:none;
    border-radius:12px;

    background:black;
    color:white;

    font-size:16px;
  }
  .miute{
    color:#777;
    font-size: 12px;
    margin-top: -15px;
    margin-left: 80px;
  }
</style>
</head>

<body>

<!-- BG -->
<div class="bg"></div>

<!-- MAIN -->
<div class="container">

    <!-- TOP -->
    <div class="top">

        <div class="name">
            Rika
        </div>

        <div class="time" id="timer">
            Ringing...
        </div>
      <div class="miute">
            <i class="fa-solid fa-microphone-slash"></i>
          </div>

    </div>

    <!-- PROFILE -->
    <div class="profile">

        <img src="https://i.ibb.co.com/tPqbLqBP/ssstik-io-1780895355426.webp">

    </div>

    <!-- BUTTON -->
    <div class="bottom-panel">

        <button class="btn">
            <i class="fa-solid fa-flag"></i>
        </button>

        <button class="btn">
            <i class="fa-solid fa-ellipsis"></i>
        </button>

        <button class="btn">
            <i class="fa-solid fa-volume-high"></i>
        </button>

        <button class="btn">
            <i class="fa-solid fa-microphone-slash"></i>
        </button>

        <button class="btn end"
        onclick="showPopup()">
            <i class="fa-solid fa-phone"></i>
        </button>

    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

    <div class="popup-box">

        <h2>
            Oops!!
        </h2>

        <p>
            The call cannot be ended. To end this call, both parties must agree. :)
        </p>

        <button class="close-btn"
        onclick="closePopup()">

            close

        </button>

    </div>

</div>

<script>

/* TIMER */
let sec = 0;

setInterval(() => {

    sec++;

    let h = Math.floor(sec / 3600);
    let m = Math.floor((sec % 3600) / 60);
    let s = sec % 60;

    h = String(h).padStart(2, "0");
    m = String(m).padStart(2, "0");
    s = String(s).padStart(2, "0");

    document.getElementById("timer").innerHTML =
        h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;

}, 1000);

/* POPUP */

function showPopup(){

    document.getElementById("popup")
    .style.display = "flex";

}

function closePopup(){

    document.getElementById("popup")
    .style.display = "none";

}


document.querySelectorAll(".btn").forEach(btn => {

    if(btn.classList.contains("end")) return;

    btn.addEventListener("click", function(){

        if(this.style.backgroundColor === "white"){
            this.style.backgroundColor = "#2d2d31";
            this.style.color = "white";
        }else{
            this.style.backgroundColor = "white";
            this.style.color = "black";
        }

    });

});

document.addEventListener('contextmenu', e => e.preventDefault());

document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("dragstart", e=>e.preventDefault());
});
</script>

</body>
</html>
