<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatVI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b141a">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #333;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.profile{
    width:30px;
    height:30px;
    border-radius:50%;
    background:red;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
}

.profile svg{
    width:12px;
    fill:white;
}

.contact{
    display:flex;
    align-items:center;
    gap:20px;
    padding:18px 25px;
    text-decoration:none;
    color:white;
    border-bottom:1px solid #333;
    transition:0.2s;
}

.contact:hover{
    background:#111;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:19px;
}
.verify{
  width:15px;
  height: 15px;
}

.verify img{
  width: 100%;
  height:100%;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">ChatVI</div>

    <a href="profil.html" class="profile">
        <svg viewBox="0 0 24 24">
            <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
        </svg>
    </a>
</div>

<a href="index.html" class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/KcQhkX75/New-Project-51-05-BDA05.png">
    </div>
    <div class="name">Rika</div>
</a>

<a href="profil.html" class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/27nhqxnh/New-Project-90-811-A70-E.png">
    </div>
    <div class="name">RIFQY</div>
    <div class="verify">
      <img src="https://i.ibb.co.com/Wv123jL6/New-Project-91-CAD5-C03.png" alt="vetify">
    </div>
</a>

</body>
</html>
