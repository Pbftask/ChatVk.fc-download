<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Language" content="id">
  <meta name="google" content="notranslate">
<title>ChatVI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b141a">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    user-select: none;
    -webkit-user-select: none;
}

body{
    background:#000;
    color:#fff;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #333;
    position:fixed;
    width:100%;
    background: #111;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.profile{
    width:30px;
    height:30px;
    border-radius:50%;
    background:red;
    display:flex;
    justify-content:center;
    align-items:center;
    
}

.profile svg{
    width:12px;
    fill:white;
}

.contact{
    display:flex;
    align-items:center;
    gap:20px;
    padding:18px 25px;
    text-decoration:none;
    color:white;
    border-bottom:1px solid #333;
    transition:0.2s;
}

.contact:hover{
    background:#111;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:12px;
}

.Rika{
  font-size:12px;
  margin-left:12px
}
  
.verify{
  width:15px;
  height: 15px;
  margin-left: -15px;
}

.verify img{
  width: 100%;
  height:100%;
}

.rank{
    position:relative;
    width:15px;
    margin-left: -9px;
}
  
.rank-img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

.verify-fx{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;

    mix-blend-mode:screen; /* atau lighten */
    opacity:1;
    pointer-events:none;
}
  
.tumbal{
  background: black;
  width: 100%;
  height: 62px;
}

.pin{
  background: #222;
  font-size: 10px;
  padding: 5px;
  border-radius: 5px;
}

.error{
  background:transparent;
  color:#999;
  text-align: center;
  padding: 30px;
}

.border{
  position:relative;
  width:40px;
  margin-left:-70px;
}

.border-img{
    width:150%;
    height:150%;
    object-fit:contain;
    display:block;
}

.border-fx{
    position:absolute;
    inset:0;
    width:150%;
    height:100%;
    object-fit:cover;

    mix-blend-mode:screen; /* atau lighten */
    opacity:1;
    pointer-events:none;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:65px;
    background:#111;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #333;
}

.nav-item{
    flex:1;
    text-decoration:none;
    color:#aaa;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:12px;
}
  
.aktif{
    flex:1;
    text-decoration:none;
    color:#00d4ff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:20px;
    margin-top:3px
}

.aktif h6{
  font-size:9px;
  margin-top:5px;
}
.nav-item i{
    font-size:22px;
    margin-bottom:4px;
}

.nav-item:hover,
.nav-item.active{
    color:#00d4ff;
}

button,
a,
.nav-item {
    -webkit-tap-highlight-color: transparent;
}
  
</style>
</head>

<body>

<div class="header">
    <div class="logo">ChatVI</div>
  
    <a href="profil.html" class="profile">
        <svg viewBox="0 0 24 24">
            <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
        </svg>
    </a>
  
</div>
<div class="tumbal"></div>

<a href="Ccl.html" class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/842Lj96H/unnamed.jpg">
    </div>
    <div class="name">Group smpn4 pam...</div>

      saved
    </div>
</a>

<a href="profil.html" class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/WvQngnDM/IMG-20260613-163402.jpg">
    </div>
  <div class="border">
    <img src="https://i.ibb.co.com/MyDfvN6M/file-00000000f86071fab5511d233bae19fa-removebg-preview.png" class="border-img">

    <video class="border-fx" autoplay muted loop playsinline>
        <source src="Border-1.mp4" type="video/mp4">
       </video>
  </div>
    <div class="Rika">RIFQY</div>
    <div class="verify">
      <img src="https://i.ibb.co.com/Wv123jL6/New-Project-91-CAD5-C03.png" alt="vetify">
    </div>
    <div class="pin">
      You self
    </div>
</a>

<a href="index.html" class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/tPqbLqBP/ssstik-io-1780895355426.webp">
    </div>
  <div class="border">
    <img src="https://i.ibb.co.com/MyDfvN6M/file-00000000f86071fab5511d233bae19fa-removebg-preview.png" class="border-img">

    <video class="border-fx" autoplay muted loop playsinline>
        <source src="Border-1.mp4" type="video/mp4">
       </video>
  </div>
    <div class="Rika">RIKA</div>
   <div class="rank">
    <img src="https://i.ibb.co.com/39Ckx60n/New-Project-172-9-B3-C93-D.png" class="rank-img">

       <video class="verify-fx" autoplay muted loop playsinline>
        <source src="animasi.mp4" type="video/mp4">
       </video>
   </div>
    <div class="pin">
      saved
    </div>
</a>

<div class="error">this a private mode</div>




<div class="bottom-nav">

    <a class="aktif">
        <i class="fas fa-home"></i>
        <h6>Beranda</h6>
    </a>

    <a href="Social.html" class="nav-item">
        <i class="fas fa-video"></i>
        <span>Video</span>
    </a>

    <a href="profil.html" class="nav-item">
        <i class="fas fa-user"></i>
        <span>Profil</span>
    </a>

</div>


  


<script>
document.addEventListener('contextmenu', e => e.preventDefault());

document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("dragstart", e=>e.preventDefault());
});
</script>
</body>
</html>
