<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Language" content="id">
  <meta name="google" content="notranslate">
<title>ChatVI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b141a">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    user-select: none;
    -webkit-user-select: none;
}

body{
    background:#000;
    color:#fff;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #333;
    position:fixed;
    width:100%;
    background: #111;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.profile{
    width:30px;
    height:30px;
    border-radius:50%;
    background:red;
    display:flex;
    justify-content:center;
    align-items:center;
    
}

.profile svg{
    width:12px;
    fill:white;
}

.contact{
    display:flex;
    align-items:center;
    gap:20px;
    padding:18px 25px;
    text-decoration:none;
    color:white;
    border-bottom:1px solid #333;
    transition:0.2s;
}

.contact:hover{
    background:#111;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:12px;
}
.verify{
  width:15px;
  height: 15px;
  margin-left: -15px;
}

.verify img{
  width: 100%;
  height:100%;
}

.tumbal{
  background: black;
  width: 100%;
  height: 62px;
}

.pin{
  background: #222;
  font-size: 10px;
  padding: 5px;
  border-radius: 5px;
}

.error{
  background:transparent;
  color:#999;
  text-align: center;
  padding: 30px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">ChatVI private</div>

    ▷
  </div>

        </svg>
    </a>
  
</div>
<div class="tumbal"></div>

<a href="Ccl.html" class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/842Lj96H/unnamed.jpg">
    </div>
    <div class="name">Group smpn4 pam...</div>
    <div class="pin">
      saved
    </div>
</a>

<a href="index.html" class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/tPqbLqBP/ssstik-io-1780895355426.webp">
    </div>
    <div class="name">Rika</div>
    <div class="pin">
      saved
    </div>
</a>

<a href="profil.html" class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/WvQngnDM/IMG-20260613-163402.jpg">
    </div>
    <div class="name">RIFQY</div>
    <div class="verify">
      <img src="https://i.ibb.co.com/Wv123jL6/New-Project-91-CAD5-C03.png" alt="vetify">
    </div>
    <div class="pin">
      You self
    </div>
</a>

<div class="error">this a private mode</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("dragstart", e=>e.preventDefault());
});
</script>
</body>
</html>
